[alembic]
script_location = alembic
prepend_sys_path = .
version_path_separator = os

# sqlalchemy.url is intentionally omitted here; env.py reads it from
# app.core.config.get_settings() so there's a single source of truth for
# DATABASE_URL (env var / .env), not a second copy in this ini file.

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
