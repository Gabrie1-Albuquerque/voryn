# Production compose: same service topology as docker-compose.yml, but no
# source bind-mounts (runs the image as built, no hot-reload), no
# externally-published database/cache ports (only reachable by other
# containers on the internal network), and the frontend is a pre-built
# static bundle served by nginx instead of the Vite dev server.
#
# Usage: docker compose -f docker-compose.prod.yml up -d --build
#
# TLS: terminated directly by this nginx via Let's Encrypt certs obtained
# with host-side certbot (standalone mode) -- see docker/nginx/conf.d/
# local.conf (gitignored, created on the host, not in this repo) for the
# HTTPS server block. Putting Cloudflare (or another TLS-terminating proxy)
# in front instead, per the original source-spec architecture, remains a
# reasonable alternative/upgrade -- not done here to avoid a second DNS
# nameserver migration on top of the one already completed via Registro.br.
services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-app}
      POSTGRES_USER: ${POSTGRES_USER:-app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env for production}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-app} -d ${POSTGRES_DB:-app}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: docker/backend/Dockerfile
    restart: unless-stopped
    # No command override: runs the Dockerfile's own CMD (`fastapi run`,
    # production mode -- no auto-reload).
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://app_runtime:${APP_RUNTIME_DB_PASSWORD:?APP_RUNTIME_DB_PASSWORD must be set}@postgres:5432/${POSTGRES_DB:-app}
      MIGRATIONS_DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-app}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}@postgres:5432/${POSTGRES_DB:-app}
      APP_RUNTIME_DB_PASSWORD: ${APP_RUNTIME_DB_PASSWORD:?APP_RUNTIME_DB_PASSWORD must be set}
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build:
      context: .
      dockerfile: docker/backend/Dockerfile
    restart: unless-stopped
    command: ["rq", "worker", "--url", "redis://redis:6379/0"]
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://app_runtime:${APP_RUNTIME_DB_PASSWORD:?APP_RUNTIME_DB_PASSWORD must be set}@postgres:5432/${POSTGRES_DB:-app}
      MIGRATIONS_DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-app}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}@postgres:5432/${POSTGRES_DB:-app}
      APP_RUNTIME_DB_PASSWORD: ${APP_RUNTIME_DB_PASSWORD:?APP_RUNTIME_DB_PASSWORD must be set}
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  scheduler:
    build:
      context: .
      dockerfile: docker/backend/Dockerfile
    restart: unless-stopped
    command: ["python", "-m", "app.workers.scheduler"]
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://app_runtime:${APP_RUNTIME_DB_PASSWORD:?APP_RUNTIME_DB_PASSWORD must be set}@postgres:5432/${POSTGRES_DB:-app}
      MIGRATIONS_DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-app}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}@postgres:5432/${POSTGRES_DB:-app}
      APP_RUNTIME_DB_PASSWORD: ${APP_RUNTIME_DB_PASSWORD:?APP_RUNTIME_DB_PASSWORD must be set}
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: docker/frontend/Dockerfile.prod

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/conf.d:/etc/nginx/conf.d:ro
      # Let's Encrypt certs live on the host (managed by certbot outside
      # Docker); mounted read-only so nginx can serve them. Only meaningful
      # once docker/nginx/conf.d/local.conf (gitignored, host-only -- see
      # that file's own comment) adds an HTTPS server block referencing
      # them. Harmless if the host path doesn't exist yet or no domain is
      # configured -- nginx just never opens 443 for anything.
      - /etc/letsencrypt:/etc/letsencrypt:ro
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - backend
      - frontend

volumes:
  postgres_data:
