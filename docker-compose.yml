services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-app}
      POSTGRES_USER: ${POSTGRES_USER:-app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-app}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-app} -d ${POSTGRES_DB:-app}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: docker/backend/Dockerfile
    restart: unless-stopped
    # Dev override: reload on code changes instead of the Dockerfile's prod `fastapi run`.
    command: ["fastapi", "dev", "--host", "0.0.0.0", "src/app/main.py"]
    env_file:
      - .env
    environment:
      # Restricted role (see migration 0001): the only one the running app
      # ever uses, so RLS actually applies. The superuser role above is for
      # Alembic (migrations_database_url) only.
      DATABASE_URL: postgresql+asyncpg://app_runtime:${APP_RUNTIME_DB_PASSWORD:-app_runtime}@postgres:5432/${POSTGRES_DB:-app}
      MIGRATIONS_DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-app}:${POSTGRES_PASSWORD:-app}@postgres:5432/${POSTGRES_DB:-app}
      APP_RUNTIME_DB_PASSWORD: ${APP_RUNTIME_DB_PASSWORD:-app_runtime}
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - ./backend/src:/app/src
      - ./backend/alembic:/app/alembic

  worker:
    build:
      context: .
      dockerfile: docker/backend/Dockerfile
    restart: unless-stopped
    # Same image as backend (identical dependencies), different entrypoint --
    # no separate Dockerfile needed for what's just a different command.
    command: ["rq", "worker", "--url", "redis://redis:6379/0"]
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://app_runtime:${APP_RUNTIME_DB_PASSWORD:-app_runtime}@postgres:5432/${POSTGRES_DB:-app}
      MIGRATIONS_DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-app}:${POSTGRES_PASSWORD:-app}@postgres:5432/${POSTGRES_DB:-app}
      APP_RUNTIME_DB_PASSWORD: ${APP_RUNTIME_DB_PASSWORD:-app_runtime}
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend/src:/app/src

  scheduler:
    build:
      context: .
      dockerfile: docker/backend/Dockerfile
    restart: unless-stopped
    # Registers the recurring reminder-scan tick then blocks running
    # rq-scheduler's loop -- a separate process/service from `worker`
    # (job consumption) and `backend` (request handling).
    command: ["python", "-m", "app.workers.scheduler"]
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://app_runtime:${APP_RUNTIME_DB_PASSWORD:-app_runtime}@postgres:5432/${POSTGRES_DB:-app}
      MIGRATIONS_DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-app}:${POSTGRES_PASSWORD:-app}@postgres:5432/${POSTGRES_DB:-app}
      APP_RUNTIME_DB_PASSWORD: ${APP_RUNTIME_DB_PASSWORD:-app_runtime}
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend/src:/app/src

  frontend:
    build:
      context: .
      dockerfile: docker/frontend/Dockerfile
    restart: unless-stopped
    environment:
      VITE_API_BASE_URL: /api
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/conf.d:/etc/nginx/conf.d:ro
    ports:
      - "8080:80"
    depends_on:
      - backend
      - frontend

  # WhatsApp bridge (Evolution API v2): one deployment, one INSTANCE per
  # tenant -- each business connects its own number via QR code from the
  # Settings screen (backend proxies /companies/me/whatsapp/*; this service
  # is never exposed publicly, only reachable on the compose network).
  # Needs its own database ("evolution", created by scripts/create-evolution-db.sh
  # or manually) -- Prisma migrations run automatically on startup.
  evolution:
    image: evoapicloud/evolution-api:latest
    restart: unless-stopped
    environment:
      AUTHENTICATION_API_KEY: ${EVOLUTION_API_KEY:-change-me-evolution-key}
      DATABASE_ENABLED: "true"
      DATABASE_PROVIDER: postgresql
      DATABASE_CONNECTION_URI: postgresql://${POSTGRES_USER:-app}:${POSTGRES_PASSWORD:-app}@postgres:5432/evolution?schema=public
      CACHE_REDIS_ENABLED: "true"
      CACHE_REDIS_URI: redis://redis:6379/2
      CACHE_REDIS_PREFIX_KEY: evolution
      # No public exposure and no manager UI needed -- QR codes flow through
      # our own backend proxy endpoints.
      SERVER_TYPE: http
      SERVER_PORT: 8080
      LOG_LEVEL: ERROR
    volumes:
      - evolution_instances:/evolution/instances
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
  evolution_instances:
