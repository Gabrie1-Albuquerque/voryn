server {
    listen 80;
    server_name _;

    # Docker's embedded DNS (127.0.0.11), with a short TTL so nginx
    # re-resolves backend/frontend's IP periodically instead of caching it
    # forever. A plain `proxy_pass http://backend:8000` resolves once at
    # nginx startup and never again -- recreating the backend container
    # (a new build, `--force-recreate`) gives it a new internal IP, and
    # nginx keeps proxying to the old, now-dead one until nginx itself is
    # restarted. Using a variable in proxy_pass (below) is what actually
    # triggers re-resolution; the resolver directive alone isn't enough.
    #
    # Gotcha this introduces: a variable in proxy_pass disables nginx's
    # usual automatic prefix-replacement (matched location prefix -> the
    # URI given in proxy_pass). /public/, /webhooks/, and /health pass
    # their path through to the backend unchanged anyway, so this doesn't
    # affect them, but /api/ -- which needs the /api prefix stripped before
    # the backend sees it -- needs an explicit rewrite to still do that.
    resolver 127.0.0.11 valid=10s;

    # Backend REST API (authenticated app + internal routes): strips /api.
    location /api/ {
        set $backend_upstream backend:8000;
        rewrite ^/api/(.*)$ /$1 break;
        proxy_pass http://$backend_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Public self-service booking API (unauthenticated, tenant resolved by
    # slug): passed through unchanged, since the backend mounts these routes
    # at this same /public/... path.
    location /public/ {
        set $backend_upstream backend:8000;
        proxy_pass http://$backend_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Backend health check, handy to hit directly through nginx
    location /health {
        set $backend_upstream backend:8000;
        proxy_pass http://$backend_upstream/health;
    }

    # Inbound provider webhooks (WhatsApp, Mercado Pago): external services
    # get told this exact path, not our /api convention, so it's routed
    # directly (unchanged) rather than through the /api/ prefix meant for
    # our own SPA.
    location /webhooks/ {
        set $backend_upstream backend:8000;
        proxy_pass http://$backend_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Everything else: frontend (Vite dev server in local dev, incl. HMR websocket)
    location / {
        set $frontend_upstream frontend:5173;
        proxy_pass http://$frontend_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
