user  nginx;
worker_processes  auto;

error_log  /var/log/nginx/error.log notice;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout  65;
    client_max_body_size 10m;

    # Don't advertise the nginx version in responses/error pages.
    server_tokens off;

    # Rate-limit zones (keyed by client IP). Applied per-location in
    # conf.d/default.conf. burst absorbs short spikes; nodelay serves the
    # burst immediately but still caps the sustained rate.
    #   auth: brute-force protection on login/reset (5 req/s per IP)
    #   public: the unauthenticated booking flow (20 req/s -- generous, real
    #           users click through several steps)
    #   webhooks: Mercado Pago callbacks (10 req/s)
    limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/s;
    limit_req_zone $binary_remote_addr zone=public:10m rate=20r/s;
    limit_req_zone $binary_remote_addr zone=webhooks:10m rate=10r/s;
    limit_req_status 429;

    include /etc/nginx/conf.d/*.conf;
}
